name: Expo Auto Update
on:
  push:
    branches:
      - main

jobs:
  update:
    name: EAS Update
    runs-on: ubuntu-latest
    steps:
      - name: Kód letöltése
        uses: actions/checkout@v4

      - name: Node.js beállítása
        uses: actions/setup-node@v4
        with:
          node-version: 20 # Frissítve 20-as verzióra

      - name: Expo környezet beállítása
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: npm

      - name: Függőségek telepítése
        working-directory: ./soulvibe-festival
        run: npm install

      - name: Frissítés küldése az Expoba
        working-directory: ./soulvibe-festival
        env:
          CI: 1 # Kényszerített CI mód
        run: eas update --auto --non-interactive
