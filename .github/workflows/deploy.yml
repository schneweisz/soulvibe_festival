name: Expo CI/CD
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Kód letöltése
        uses: actions/checkout@v4

      - name: Node.js beállítása
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ./app/package-lock.json

      - name: Függőségek telepítése
        working-directory: ./app
        run: npm install --legacy-peer-deps

      - name: Tesztek futtatása
        working-directory: ./app
        run: npm test

  deploy:
    name: EAS Update
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Kód letöltése
        uses: actions/checkout@v4

      - name: Node.js beállítása
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Expo környezet beállítása
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: npm

      - name: Függőségek telepítése
        working-directory: ./app
        run: npm install --legacy-peer-deps

      - name: CLI jogosultságok javítása
        working-directory: ./app
        run: |
          find node_modules -type d -name bin | xargs -I{} find {} -type f | xargs chmod +x 2>/dev/null || true
          find node_modules/react-native/sdks -type f | xargs chmod +x 2>/dev/null || true

      - name: Frissítés küldése az Expoba
        working-directory: ./app
        env:
          CI: 1
        run: eas update --auto --non-interactive

  build:
    name: Production Build
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Kód letöltése
        uses: actions/checkout@v4

      - name: Node.js beállítása
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Expo környezet beállítása
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: npm

      - name: Függőségek telepítése
        working-directory: ./app
        run: npm install --legacy-peer-deps

      - name: CLI jogosultságok javítása
        working-directory: ./app
        run: |
          find node_modules -type d -name bin | xargs -I{} find {} -type f | xargs chmod +x 2>/dev/null || true
          find node_modules/react-native/sdks -type f | xargs chmod +x 2>/dev/null || true

      - name: Build indítása preview környezetben (APK)
        working-directory: ./app
        run: eas build --platform android --profile preview --non-interactive --no-wait
